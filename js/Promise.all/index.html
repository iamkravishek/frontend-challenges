<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promise.all Implementation</title>
</head>
<body>
    <h1>Promise.all</h1>
    <script>
        function PromiseAll(args){
            let resultCollected = [];
            let totalCount =  args.length;
            let totalItems = 0;

            if (args.length === 0) return Promise.resolve([]);

            return  new Promise((resolve, reject)=>{
                for(let i = 0; i < args.length; i++){
                   Promise.resolve(args[i])
                   .then((value)=>{
                        resultCollected[i] = value;
                        totalItems++;

                        if(totalItems === totalCount){
                            resolve(resultCollected);
                        }
                   })
                   .catch((err)=>{
                        reject(err);
                   })
                }
            })
        }
    </script>
</body>
</html>
