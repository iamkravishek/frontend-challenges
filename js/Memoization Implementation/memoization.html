<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoization</title>
</head>
<body>
    <h1>Memoization Implementation</h1>

    <script>
    function memoize(fn){
        const cacheResults = new Map();
        return function(...args){
            const KEY = JSON.stringify(args);

            if(cacheResults.has(KEY)){
                return cacheResults.get(KEY);
            }

            const computedValue = fn(...args);
            cacheResults.set(KEY,computedValue)
            return computedValue;
        }
    }


    function findSum(int = 1000000){
        let sum = 0;
        for(let i = 0; i < int; i ++){
            sum += i;
        }
        return sum;
    }

    const memoizedValue = memoize(findSum);

    console.log("testing memoized val",memoizedValue())

    </script>
</body>
</html>
